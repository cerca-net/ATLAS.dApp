<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATLAS Faucet Monitor</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #4caf50;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .card {
            background: #2c2c2c;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid #333;
        }

        .label {
            font-size: 0.9em;
            color: #aaa;
            margin-bottom: 5px;
        }

        .value {
            font-size: 1.2em;
            font-family: monospace;
            color: #fff;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            background-color: #4caf50;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1em;
            width: 100%;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        #logs {
            background: #000;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            height: 200px;
            overflow-y: auto;
            font-size: 0.9em;
            border: 1px solid #333;
        }

        .log-entry {
            margin-bottom: 5px;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 2px;
        }

        .success {
            color: #4caf50;
        }

        .error {
            color: #f44336;
        }

        .info {
            color: #2196f3;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🚰 ATLAS Faucet Monitor</h1>

        <div class="card">
            <div class="label">TREASURY STATUS</div>
            <div class="label">Address: <span id="treasuryAddress" class="value"
                    style="font-size: 0.9em">Loading...</span></div>
            <div class="label" style="margin-top: 10px;">Current Balance:</div>
            <div id="treasuryBalance" class="value" style="color: #64ffda; font-size: 2em;">Loading...</div>
        </div>

        <div class="card">
            <div class="label">MANUAL OPERATOR</div>
            <input type="text" id="recipientAddress" placeholder="Enter recipient wallet address (0x...)" />
            <button onclick="requestTokens()">💸 Send 1000 TCOIN</button>
        </div>

        <div class="card">
            <div class="label">NODE CONTROLS</div>
            <div style="display: flex; gap: 10px;">
                <button onclick="controlNode('start')" style="background-color: #2196f3;">▶ Start</button>
                <button onclick="controlNode('stop')" style="background-color: #f44336;">⏹ Stop</button>
                <button onclick="controlNode('sync')" style="background-color: #ff9800;">🔄 Sync</button>
            </div>
        </div>

        <div class="card">
            <div class="label">OPERATION LOGS</div>
            <div id="logs"></div>
        </div>
    </div>

    <script>
        const API_URL = "http://localhost:8080";

        function log(message, type = 'info') {
            const logs = document.getElementById('logs');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.innerText = `[${new Date().toLocaleTimeString()}] ${message}`;
            logs.insertBefore(entry, logs.firstChild);
        }

        async function updateTreasuryStatus() {
            try {
                // Use the new endpoint instead of hardcoded address
                const response = await fetch(`${API_URL}/treasury`);
                if (!response.ok) throw new Error("Failed to fetch treasury info");
                const data = await response.json();

                document.getElementById('treasuryAddress').innerText = data.address;
                document.getElementById('treasuryBalance').innerText = parseInt(data.balance).toLocaleString() + " TCOIN";
            } catch (e) {
                // Keep silent on polling errors to avoid log spam, just update UI
                document.getElementById('treasuryBalance').innerText = "Node Offline / Error";
            }
        }

        async function requestTokens() {
            const address = document.getElementById('recipientAddress').value.trim();
            if (!address) {
                log("Please enter a valid address", "error");
                return;
            }

            log(`Initiating transfer to ${address.substring(0, 10)}...`, "info");

            try {
                const response = await fetch(`${API_URL}/faucet`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address: address })
                });

                const result = await response.json();

                if (response.ok) {
                    log(`✅ SUCCESS: Sent 1000 TCOIN`, "success");
                    log(`TxHash: ${result.txHash}`, "info");

                    // Update balance immediately
                    setTimeout(updateTreasuryStatus, 1000);
                } else {
                    log(`❌ FAILED: ${result.message || "Unknown error"}`, "error");
                }
            } catch (e) {
                log(`❌ NETWORK ERROR: ${e.message}`, "error");
            }
        }

        async function controlNode(action) {
            log(`Initiating node action: ${action.toUpperCase()}...`, "info");
            try {
                const response = await fetch(`${API_URL}/node/${action}`, { method: 'POST' });
                const result = await response.json();

                if (response.ok) {
                    log(`✅ ACTION SUCCESS: ${result.status}`, "success");
                } else {
                    log(`❌ ACTION FAILED: ${result.message || response.statusText}`, "error");
                }
            } catch (e) {
                log(`❌ NETWORK ERROR: ${e.message}`, "error");
            }
        }

        // Initialize
        updateTreasuryStatus();
        setInterval(updateTreasuryStatus, 5000); // Poll every 5 seconds
    </script>
</body>

</html>
