# =============================================================================
# Cerca Network - Production Docker Compose
# =============================================================================
# Usage:
#   1. Copy .env.example to .env and fill in secrets
#   2. docker compose up -d
# =============================================================================

version: "3.9"

services:
  # ---------------------------------------------------------------------------
  # ATLAS Blockchain Node
  # ---------------------------------------------------------------------------
  blockchain:
    build:
      context: ./ATLAS.BC0.0.1
      dockerfile: Dockerfile
    container_name: cerca-blockchain
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - blockchain-data:/data
    environment:
      - API_PORT=8080
      - DATABASE_PATH=/data/blockchain.db
      - NODE_KEY_PATH=/data/nodekey.priv
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - NETWORK_MODE=production
      - TREASURY_MNEMONIC=${TREASURY_MNEMONIC}
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - BOOTSTRAP_PEERS=${BOOTSTRAP_PEERS:-}
    networks:
      - cerca-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/status" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ---------------------------------------------------------------------------
  # CercaEnd Frontend (Flutter Web)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./cercaend
      dockerfile: Dockerfile
      args:
        - BLOCKCHAIN_API_URL=${BLOCKCHAIN_API_URL:-http://blockchain:8080}
        - SUPABASE_URL=${SUPABASE_URL}
        - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
    container_name: cerca-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      blockchain:
        condition: service_healthy
    volumes:
      - ./deploy/nginx/cercachain.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-data:/etc/letsencrypt:ro
    networks:
      - cerca-network
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # ---------------------------------------------------------------------------
  # Admin Panel (React/Vite - Static Build)
  # ---------------------------------------------------------------------------
  admin:
    build:
      context: ./cerca-admin-panel
      dockerfile: Dockerfile
    container_name: cerca-admin-panel
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      blockchain:
        condition: service_healthy
    environment:
      - VITE_NODE_URL=${BLOCKCHAIN_API_URL:-http://blockchain:8080}
      - VITE_ADMIN_API_KEY=${ADMIN_API_KEY}
    networks:
      - cerca-network

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  cerca-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  blockchain-data:
    driver: local
  certbot-data:
    driver: local
