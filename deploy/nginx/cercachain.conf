# =============================================================================
# CercaChain — Production nginx Reverse Proxy
# =============================================================================
# Place this in /etc/nginx/sites-available/cercachain
# Handles TLS termination, rate limiting, and proxying to the blockchain node.
#
# Prerequisites:
#   1. Obtain TLS cert via Let's Encrypt:
#      certbot certonly --nginx -d api.cercachain.io -d app.cercachain.io
#   2. Update server_name and ssl_certificate paths below
#   3. nginx -t && systemctl reload nginx
# =============================================================================

# --- Rate limiting zones ---
limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=api_write:10m   rate=5r/s;

# --- Upstream: ATLAS blockchain node ---
upstream blockchain_node {
    server 127.0.0.1:8080;
    keepalive 32;
}

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    server_name api.cercachain.io app.cercachain.io;
    return 301 https://$host$request_uri;
}

# --- API: Blockchain Node ---
server {
    listen 443 ssl http2;
    server_name api.cercachain.io;

    # TLS Configuration
    ssl_certificate     /etc/letsencrypt/live/api.cercachain.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cercachain.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Request size limits
    client_max_body_size 1m;

    # --- Public API endpoints (rate limited) ---
    location / {
        limit_req zone=api_general burst=60 nodelay;

        proxy_pass http://blockchain_node;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;
    }

    # --- Write endpoints (stricter rate limit) ---
    location ~ ^/(submit-transaction|faucet|register-validator|social/.*/create) {
        limit_req zone=api_write burst=10 nodelay;

        proxy_pass http://blockchain_node;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Admin endpoints (already auth-gated, extra IP restriction recommended) ---
    location ~ ^/(admin/|node/|run-tests|test-|start-test|stop-test|backup/|snapshot/) {
        # Uncomment to restrict admin access by IP:
        # allow 203.0.113.0/24;
        # deny all;

        limit_req zone=api_write burst=10 nodelay;

        proxy_pass http://blockchain_node;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Health check (no rate limit) ---
    location = /status {
        proxy_pass http://blockchain_node;
        proxy_http_version 1.1;
    }
}

# --- App: Flutter Web Frontend ---
server {
    listen 443 ssl http2;
    server_name app.cercachain.io;

    ssl_certificate     /etc/letsencrypt/live/app.cercachain.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.cercachain.io/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "SAMEORIGIN" always;

    root /var/www/cercachain/web;
    index index.html;

    # Flutter web SPA — fallback all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
